name: Build Windows EXE

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT_PATH: NetBar/NetBar.csproj
  ARTIFACT_NAME: NetBar-win-x64

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore dependencies
        run: dotnet restore $env:PROJECT_PATH

      - name: Build
        run: dotnet build $env:PROJECT_PATH --configuration Release --no-restore

      - name: Publish EXE
        id: publish
        run: |
          dotnet publish $env:PROJECT_PATH --configuration Release -r win-x64 --self-contained false -o publish_output
          # Output the resolved path for downstream steps
          $publishOutput = Join-Path $PWD "publish_output"
          echo "publish_dir=$publishOutput" >> $env:GITHUB_OUTPUT
          Write-Host "Published to: $publishOutput"
          if (-not (Test-Path $publishOutput)) {
            Write-Error "Publish output directory not found"
            exit 1
          }
          Get-ChildItem -Path $publishOutput -File | ForEach-Object { Write-Host "  - $($_.Name)" }

      - name: Package artifact
        shell: pwsh
        run: |
          $zip = "$env:ARTIFACT_NAME.zip"
          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }

          # Use the publish_dir output from the publish step
          $publishDir = "${{ steps.publish.outputs.publish_dir }}"
          Write-Host "Using publish dir: $publishDir"

          if (-not (Test-Path $publishDir)) {
            Write-Error "Publish directory not found: $publishDir"
            exit 1
          }

          # Create a temp folder named NetBar, copy files into it, then zip the folder
          $tempFolder = Join-Path $PWD "NetBar"
          if (Test-Path $tempFolder) {
            Remove-Item $tempFolder -Recurse -Force
          }
          New-Item -ItemType Directory -Path $tempFolder | Out-Null
          Get-ChildItem -Path $publishDir | Copy-Item -Destination $tempFolder -Recurse -Force

          Compress-Archive -Path (Join-Path $tempFolder -ChildPath '*') -DestinationPath $zip -Force -CompressionLevel Fastest
          Remove-Item $tempFolder -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.zip
          if-no-files-found: error

      - name: Attach artifact to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_NAME }}.zip
          generate_release_notes: true
