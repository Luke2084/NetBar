name: Build Windows EXE

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT_PATH: NetBar/NetBar.csproj
  PUBLISH_DIR: NetBar/bin/Release/net10.0-windows/win-x64/publish
  ARTIFACT_NAME: NetBar-win-x64

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore $env:PROJECT_PATH -r win-x64

      - name: Build
        run: dotnet build $env:PROJECT_PATH --configuration Release --no-restore

      - name: Publish EXE
        run: dotnet publish $env:PROJECT_PATH --configuration Release -r win-x64 --self-contained false

      - name: Package artifact
        shell: pwsh
        run: |
          $zip = "$env:ARTIFACT_NAME.zip"
          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }

          # Debug: show what pwsh sees as working directory
          Write-Host "pwsh pwd: $PWD"
          Write-Host "session state pwd: $(pwd)"
          Write-Host "pwd command: $(Get-Location)"

          # Find the publish directory: always search recursively to avoid path resolution issues
          $publishDir = (Get-ChildItem -Path (Get-Location) -Recurse -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -eq 'publish' } |
            Select-Object -First 1).FullName

          Write-Host "Resolved publish dir: $publishDir"

          if (-not $publishDir -or -not (Test-Path $publishDir)) {
            Write-Error "Publish directory not found"
            Write-Host "All directories under ${PWD}:"
            Get-ChildItem -Path $PWD -Recurse -Directory -Name 2>&1 | Write-Host
            # Also show any bin or obj directories
            Write-Host "Searching for bin/obj dirs:"
            Get-ChildItem -Path $PWD -Recurse -Directory -Name -Include bin,obj -ErrorAction SilentlyContinue | Write-Host
            exit 1
          }

          # Create a temp folder named NetBar, copy files into it, then zip the folder
          $tempFolder = Join-Path $PWD "NetBar"
          if (Test-Path $tempFolder) {
            Remove-Item $tempFolder -Recurse -Force
          }
          New-Item -ItemType Directory -Path $tempFolder | Out-Null
          Get-ChildItem -Path $publishDir | Copy-Item -Destination $tempFolder -Recurse -Force

          Compress-Archive -Path (Join-Path $tempFolder -ChildPath '*') -DestinationPath $zip -Force -CompressionLevel Fastest
          Remove-Item $tempFolder -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.zip
          if-no-files-found: error

      - name: Attach artifact to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_NAME }}.zip
          generate_release_notes: true
