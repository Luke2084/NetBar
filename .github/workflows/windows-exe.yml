name: Build Windows EXE

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT_PATH: NetBar/NetBar.csproj
  PUBLISH_DIR: NetBar/bin/Release/net10.0-windows/win-x64/publish
  ARTIFACT_NAME: NetBar-win-x64

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore $env:PROJECT_PATH -r win-x64

      - name: Build
        run: dotnet build $env:PROJECT_PATH --configuration Release --no-restore

      - name: Publish EXE
        run: dotnet publish $env:PROJECT_PATH --configuration Release -r win-x64 --self-contained false

      - name: Package artifact
        shell: pwsh
        run: |
          $zip = "$env:ARTIFACT_NAME.zip"
          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }

          # Resolve the publish directory relative to the repo root
          $repoRoot = $PWD
          $publishDir = Join-Path $repoRoot $env:PUBLISH_DIR

          if (-not (Test-Path $publishDir)) {
            Write-Error "Publish directory not found: $publishDir"
            exit 1
          }

          # Create a temp folder named NetBar, copy files into it, then zip the folder
          $tempFolder = Join-Path $PWD "NetBar"
          if (Test-Path $tempFolder) {
            Remove-Item $tempFolder -Recurse -Force
          }
          New-Item -ItemType Directory -Path $tempFolder | Out-Null
          Copy-Item -Path (Join-Path $publishDir -ChildPath '*') -Destination $tempFolder -Recurse -Force

          Compress-Archive -Path (Join-Path $tempFolder -ChildPath '*') -DestinationPath $zip -Force -CompressionLevel Fastest
          Remove-Item $tempFolder -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.zip
          if-no-files-found: error

      - name: Attach artifact to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_NAME }}.zip
          generate_release_notes: true
