name: Build Windows EXE

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT_PATH: NetBar/NetBar.csproj
  PUBLISH_DIR: NetBar/bin/Release/net10.0-windows/win-x64/publish
  ARTIFACT_NAME: NetBar-win-x64

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH

      - name: Build
        run: dotnet build $env:PROJECT_PATH --configuration Release --no-restore

      - name: Publish self-contained EXE
        run: dotnet publish $env:PROJECT_PATH --configuration Release -r win-x64 --self-contained true

      - name: Package artifact
        shell: pwsh
        run: |
          $zip = "$env:ARTIFACT_NAME.zip"
          if (Test-Path $zip) {
            Remove-Item $zip
          }
          # Prefer explicit publish path; if it doesn't exist, try to locate the publish folder produced by dotnet publish
          if (Test-Path $env:PUBLISH_DIR) {
            Compress-Archive -Path "$($env:PUBLISH_DIR)\*" -DestinationPath $zip -Force
          } else {
            $publish = Get-ChildItem -Path (Join-Path $PWD $env:PROJECT_PATH | Split-Path -Parent) -Recurse -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -eq 'publish' } | Select-Object -First 1
            if ($publish) {
              Compress-Archive -Path "$($publish.FullName)\*" -DestinationPath $zip -Force
            } else {
              Write-Error "Publish directory not found. Ensure dotnet publish succeeded."
              exit 1
            }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.zip

      - name: Attach artifact to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_NAME }}.zip
